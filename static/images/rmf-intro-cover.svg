<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#2e2e33"/>
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Accent bar -->
  <rect x="80" y="180" width="6" height="120" fill="#4a9eff" rx="3"/>
  <!-- Category label -->
  <text x="106" y="218" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#4a9eff" letter-spacing="3" font-weight="600">RMF</text>
  <!-- Main title -->
  <text x="106" y="275" font-family="'Segoe UI', Arial, sans-serif" font-size="52" fill="#ffffff" font-weight="700">What Is RMF?</text>
  <text x="106" y="340" font-family="'Segoe UI', Arial, sans-serif" font-size="36" fill="#cccccc" font-weight="400">A Practical Introduction</text>
  <text x="106" y="385" font-family="'Segoe UI', Arial, sans-serif" font-size="36" fill="#cccccc" font-weight="400">for SysAdmins</text>
  <!-- Divider -->
  <rect x="106" y="420" width="200" height="2" fill="#4a9eff" opacity="0.5"/>
  <!-- Site name -->
  <text x="106" y="460" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#888888" letter-spacing="1">wellscript.io</text>
</svg>
